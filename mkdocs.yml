site_name: Agentic Trace Analyzer
site_description: Ontology-backed analysis and classification for agentic AI session traces.
site_url: https://cmungall.github.io/agentic-trace-analyzer
repo_name: agentic-trace-analyzer
repo_url: https://github.com/cmungall/agentic-trace-analyzer
watch:
  - src/agentic_trace_analyzer/schema

theme:
  name: material
  icon:
    logo: material/book-open-page-variant
    repo: fontawesome/brands/github
  features:
    - content.tabs.link
    - header.autohide
    - content.action.edit
    - navigation.sections
    - navigation.expand
    - navigation.instant
    - navigation.instant.progress
    - navigation.indexes
    - navigation.top
    - navigation.tracking
    - search.suggest
    - content.code.copy
  palette:
    - scheme: default
      primary: teal
      accent: amber

plugins:
  - search
  - mermaid2:
      version: 11.4.1
  - mkdocs_pymdownx_material_extras:

markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
          class: mermaid
  - pymdownx.magiclink
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - pymdownx.details
  - toc:
      permalink: true
validation:
  nav:
    omitted_files: ignore

exclude_docs: |
  /templates-linkml/

nav:
  - Home: index.md
  - Failure Mode Taxonomy: failure-mode-taxonomy.md
  - Trace Corpus: trace-corpus.md
  - Schema: elements/index.md
  - Appendix:
      - Research Synthesis: research-synthesis.md
